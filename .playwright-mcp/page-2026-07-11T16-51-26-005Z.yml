              - text: "양대리봇 : 누르면 양대리봇 사용 예시를 보여줍니다.전체적용 : 문서 전체를 한 번에 정리합니다.블록적용 : 선택한 부분만 정리합니다.1줄적용 : 현재 선택한 줄만 정리합니다.표 서식 맞추기 : 표 안에 커서를 두고 누르면 서울교통공사 표 서식으로 변경합니다."
