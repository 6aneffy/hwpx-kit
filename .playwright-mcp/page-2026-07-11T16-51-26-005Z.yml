            - generic [ref=e503]:
              - strong [ref=e504]: 10행
              - text: "표지목차 : 표지와 목차가 들어간 문서를 만든다.단문보고 : 짧은 보고서 문서를 만든다.장문보고 : 긴 보고서 문서를 만든다.보도자료 : 보도자료 문서를 만든다.개인정보 : 개인정보 동의서를 만든다.편집용지 : 문서 여백을 좌우 20, 위 15, 아래 10, 머리말·꼬리말 10으로 설정한다."
              - strong [ref=e505]: 11행
              - text: "참석명단 : 참석자 명단 문서를 만든다.명패생성 : 참석명단 표 안에서 실행하면 명패를 만든다.명찰생성 : 참석명단 표 안에서 실행하면 명찰을 만든다.선택범위 정리한다 : 쉬운 마크다운 기능을 제공합니다(영상참조)- 아래 내용에 대하여 □ 글머리를 적용합니다네모 내용네모:내용ㅁ내용□내용- 아래 내용에 대하여 ○ 글머리를 적용합니다원 내용원:내용ㅇ내용○내용- 아래 내용에 대하여 - 글머리를 적용합니다바 내용바:내용-내용- 아래 내용에 대하여 * 글머리를 적용합니다별 내용별:내용*내용- 아래 내용에 대하여 ※ 글머리를 적용합니다당구 내용당구:내용당구장 내용당구장:내용※내용- 아래 내용에 대하여 제목 서식을 적용합니다제목 제목내용제목:제목내용제목 제목내용:보고자제목:제목내용:보고자- 아래 내용에 대하여 중제목, 소제목 서식을 적용하고 알아서 번호를 붙여줍니다중제목 내용중제목:내용소제목 내용소제목:내용- 아래 내용에 대하여 참고, 붙임 서식을 적용합니다참고 내용참고:내용붙임 내용붙임:내용- 아래 내용에 대하여 글상자 서식을 적용합니다글상자 내용글상자:내용"
