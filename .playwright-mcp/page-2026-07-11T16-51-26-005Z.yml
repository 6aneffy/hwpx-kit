            - generic [ref=e471]:
              - strong [ref=e472]: 1행
              - text: "네모 : 선택한 문단의 글머리를 네모 모양으로 변경합니다.원 : 선택한 문단의 글머리를 원 모양으로 변경합니다.바 : 선택한 문단의 글머리를 바(―) 모양으로 변경합니다.별 : 선택한 문단의 글머리를 별 모양으로 변경합니다.금액 : 선택한 숫자를 한글 금액 형식으로 변환합니다.- 예시 : 12345600 → 일금 일천이백삼십사만오천육백 원정 (₩12,345,600)천원 : 선택한 금액을 천원 단위로 변환합니다.백만원 : 선택한 금액을 백만원 단위로 변환합니다."
              - strong [ref=e473]: 2행
              - text: "헤드라인 : 선택한 글자의 폰트를 헤드라인체로 변경합니다.신명조 : 선택한 글자의 폰트를 신명조로 변경합니다.휴명조 : 선택한 글자의 폰트를 휴먼명조로 변경합니다.중고딕 : 선택한 글자의 폰트를 중고딕으로 변경합니다.자간줄이기 : 선택한 글자의 글자 간격을 좁힙니다.자간늘리기 : 선택한 글자의 글자 간격을 넓힙니다.윗첨자 : 선택한 내용을 윗첨자 형식으로 변경합니다.윗첨자X : 선택한 내용을 기본 글자 형식으로 되돌립니다.블록대괄호 : 선택한 내용의 앞뒤에 대괄호 [ ]를 추가합니다.블록홑낫표 : 선택한 내용의 앞뒤에 홑낫표 「 」를 추가합니다.형광 : 선택한 내용에 형광 표시를 적용합니다."
              - strong [ref=e474]: 3~4행
              - text: "특수문자 : 버튼을 누르면 해당 특수문자가 바로 입력됩니다."
            - table [ref=e476]:
              - rowgroup [ref=e477]:
                - row [ref=e478]:
                  - cell [ref=e479]:
                    - 'generic "Play: Video" [ref=e482]':
