            - generic [ref=e486]:
              - strong [ref=e487]: 5행
              - text: "제목 : 커서 위치에 제목 양식을 생성합니다.중제목 : 커서 위치에 중제목 양식을 생성합니다.소제목 : 커서 위치에 소제목 양식을 생성합니다.글상자 : 커서 위치에 글상자를 생성합니다.붙임 : 커서 위치에 붙임 문구를 생성합니다.참고 : 커서 위치에 참고 문구를 생성합니다.핵심표 : 커서 위치에 핵심 내용 정리용 표를 생성합니다."
              - strong [ref=e488]: 6행
              - text: "예산금액표 : 커서 위치에 예산 작성용 표를 생성합니다.시간계획표 : 커서 위치에 시간 계획표를 생성합니다.추진일정표 : 커서 위치에 추진 일정표를 생성합니다.표배경색 모음 : 선택한 셀 범위에 하늘색, 회색, 진회색, 흰색 배경색을 적용합니다.추진일정표와 함께 사용하면 더욱 편리합니다.2단 사진표 : 커서 위치에 2칸 사진표를 생성합니다.- 버튼을 누르면 사진을 선택할 수 있습니다.- 사진 파일 이름에 (설명) 형식의 문구가 있으면 설명 칸에 자동 입력됩니다.3단 사진표 : 커서 위치에 3칸 사진표를 생성합니다.- 버튼을 누르면 사진을 선택할 수 있습니다.- 사진 파일 이름에 (설명) 형식의 문구가 있으면 설명 칸에 자동 입력됩니다"
              - strong [ref=e489]: 7행
              - text: "3단표 : 커서 위치에 3칸짜리 표를 생성합니다.4단표 : 커서 위치에 4칸짜리 표를 생성합니다.5단표 : 커서 위치에 5칸짜리 표를 생성합니다.4단 순서표 : 커서 위치에 4칸 구성의 순서표를 생성합니다.5단 순서표 : 커서 위치에 5칸 구성의 순서표를 생성합니다.표전용 천원 : 선택한 셀 범위의 숫자를 천원 단위로 자동 변환합니다.- 예시 : 10,000원 → 10천원, 1.23억 → 123,000천원- 사용 전 표에 셀 병합이 없어야 하며, 범위 선택 시 빨간 표시가 오른쪽 아래에 있어야 합니다.표전용 백만원 : 선택한 셀 범위의 숫자를 백만원 단위로 자동 변환합니다.- 예시 : 1.23억 → 123백만원, 1,234천원 → 1백만원- 사용 전 표에 셀 병합이 없어야 하며, 범위 선택 시 빨간 표시가 오른쪽 아래에 있어야 합니다."
              - strong [ref=e490]: 8행
              - text: "단위원 : 표 안에 커서를 두고 클릭하면 표 오른쪽 상단에 (단위: 원) 캡션이 추가됩니다.부가세 : 표 안에 커서를 두고 클릭하면 표 오른쪽 상단에 (부가세 포함) 캡션이 추가됩니다.불포함 : 표 안에 커서를 두고 클릭하면 표 오른쪽 상단에 (부가세 불포함) 캡션이 추가됩니다.제거 : 표 안에 커서를 두고 클릭하면 추가된 캡션이 삭제됩니다.세자리 콤마 : 선택한 셀 범위의 숫자에 3자리마다 콤마(,)가 자동으로 입력됩니다.엑셀 : 엑셀에서 한컴으로 옮겨서 깨진 표에서 선택한 셀 범위를 사용하기 좋게 정리합니다.엑셀 : 엑셀에서 한컴으로 붙여넣을 때 깨진 표를 선택한 셀 범위 기준으로 보기 좋게 자동 정리합니다."
              - strong [ref=e491]: 9행
              - text: "상하마크 : 커서 위치에 위아래 형태의 인천국제공항 마크를 넣는다.좌우마크 : 커서 위치에 좌우 형태의 인천국제공항 마크를 넣는다.부서 : 커서 위치에 부서명을 입력할 수 있는 인천국제공항 마크를 넣는다."
