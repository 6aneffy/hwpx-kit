name: 버그 제보 (Bug report)
description: analyze/fill 실패, 서식 깨짐 등 — 실패 사례 제보가 가장 값집니다
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        > 🔴 **기관 내부 문서를 첨부하지 마세요.** 업무 문서는 공개 저장소에 영구히 남습니다.
        > 같은 구조를 한글에서 새로 만든 **합성 예시 파일**로 재현해서 첨부해 주세요.
        > (공개 출처 서식 — 예: 정보공개포털의 공개 서식 — 은 첨부 가능합니다)
  - type: textarea
    id: what
    attributes:
      label: 무슨 일이 있었나요
      description: 기대한 동작과 실제 동작
      placeholder: "table:성명 채우기가 다른 셀에 들어감 / fill 후 한글에서 열면 표 테두리가 사라짐 …"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 재현 방법
      description: 실행한 명령(또는 Claude에게 한 요청)과 합성 예시 파일
      placeholder: |
        1. hwpx-kit analyze 예시.hwpx --json
        2. hwpx-kit fill 예시.hwpx --data 값.json --out 결과.hwpx
        3. 결과.hwpx를 한글에서 열면 …
    validations:
      required: true
  - type: textarea
    id: envelope
    attributes:
      label: CLI 출력 (--json 봉투)
      description: 실패한 명령의 JSON 출력을 그대로 붙여넣기 (문서 내용이 섞였으면 가려도 됩니다)
      render: json
  - type: input
    id: version
    attributes:
      label: 버전
      description: "`hwpx-kit --version` 출력"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: 환경
      placeholder: "Windows 11 / macOS 15, Python 3.12, 한글 2024 유무"
